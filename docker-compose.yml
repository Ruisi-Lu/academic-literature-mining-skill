name: academic-literature-mining

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: academic-literature-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}"
      QDRANT__SERVICE__ENABLE_CORS: "false"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - qdrant_storage:/qdrant/storage
    security_opt:
      - no-new-privileges:true

volumes:
  qdrant_storage:
    name: academic-literature-qdrant-storage
