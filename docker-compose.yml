name: "litmine-${LITMINE_PROJECT:?Set LITMINE_PROJECT to a unique paper slug in that paper's .env file}"

services:
  litmine:
    image: "${LITMINE_IMAGE:-ghcr.io/ruisi-lu/academic-literature-mining-skill}:${LITMINE_VERSION:-0.1.2}"
    profiles: ["cli"]
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: "http://qdrant:6333"
      PDFIUM_AUTO_CACHE_DIR: "/opt/litmine/pdfium"
      HOME: "/tmp"
    user: "${LITMINE_UID:-1000}:${LITMINE_GID:-1000}"
    working_dir: /workspace
    volumes:
      - type: bind
        source: "./projects/${LITMINE_PROJECT:?Set LITMINE_PROJECT before starting this corpus}"
        target: /workspace
        bind:
          create_host_path: false
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}"
      QDRANT__SERVICE__ENABLE_CORS: "false"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - qdrant_storage:/qdrant/storage
    security_opt:
      - no-new-privileges:true

volumes:
  qdrant_storage:
