name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Install declared Rust components
        run: rustup component add clippy rustfmt

      - name: Match tag, Cargo package, and Compose image versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "academic-literature-mining") | .version')"
          environment_version="$(sed -n 's/^LITMINE_VERSION=//p' .env.example)"
          compose_version="$(sed -n 's/.*LITMINE_VERSION:-\([^}]*\)}.*/\1/p' docker-compose.yml)"
          test "$GITHUB_REF_NAME" = "v${package_version}"
          test "$environment_version" = "$package_version"
          test "$compose_version" = "$package_version"
          printf 'version=%s\n' "$package_version" >> "$GITHUB_OUTPUT"

      - name: Validate Rust project
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --all-targets --locked
          cargo build --release --locked

      - name: Validate JSON assets
        run: |
          for file in assets/*.json; do
            jq empty "$file"
          done

      - name: Validate Docker Compose configuration
        run: |
          cp .env.example .env
          QDRANT_API_KEY=ci-validation-secret docker compose config --quiet

  image:
    name: Publish multi-architecture image
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE_NAME: ghcr.io/ruisi-lu/academic-literature-mining-skill
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate OCI tags and labels
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and publish image
        id: image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            LITMINE_VERSION=${{ needs.validate.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest published image
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Publish GitHub Release
    needs:
      - validate
      - image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release after the image is available
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            printf 'Release %s already exists; leaving it unchanged.\n' "$GITHUB_REF_NAME"
            exit 0
          fi
          release_flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Academic Literature Mining ${GITHUB_REF_NAME}" \
            --notes "Prebuilt image: \`ghcr.io/ruisi-lu/academic-literature-mining-skill:${VERSION}\` (${IMAGE_DIGEST})" \
            "${release_flags[@]}"
