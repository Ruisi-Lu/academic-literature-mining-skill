name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Install declared Rust components
        run: rustup component add clippy rustfmt

      - name: Match tag, Cargo package, and Compose image versions
        id: version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(cargo metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "academic-literature-mining") | .version')"
          environment_version="$(sed -n 's/^LITMINE_VERSION=//p' .env.example)"
          compose_version="$(sed -n 's/.*LITMINE_VERSION:-\([^}]*\)}.*/\1/p' docker-compose.yml)"
          test "$GITHUB_REF_NAME" = "v${package_version}"
          test "$environment_version" = "$package_version"
          test "$compose_version" = "$package_version"
          printf 'version=%s\n' "$package_version" >> "$GITHUB_OUTPUT"

      - name: Validate Rust project
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --all-targets --locked
          cargo build --release --locked

      - name: Validate JSON assets
        run: |
          for file in assets/*.json; do
            jq empty "$file"
          done

      - name: Validate Docker Compose configuration
        run: |
          LITMINE_PROJECT=ci-validation \
            QDRANT_API_KEY=ci-validation-secret \
            docker compose --profile cli config --quiet

  image:
    name: Publish multi-architecture image
    needs: validate
    uses: docker/github-builder/.github/workflows/build.yml@3415a188caae9a0da7fba83bc06985776e0b1790 # v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      runner: |
        default=ubuntu-24.04
        linux/arm64=ubuntu-24.04-arm
      context: .
      file: ./Dockerfile
      build-args: |
        LITMINE_VERSION=${{ needs.validate.outputs.version }}
        VCS_REF=${{ github.sha }}
      cache: true
      cache-scope: litmine-container
      cache-mode: max
      sbom: true
      sign: "true"
      set-meta-labels: true
      set-meta-annotations: true
      meta-images: ghcr.io/ruisi-lu/academic-literature-mining-skill
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  attest:
    name: Attest published image
    needs: image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Login to GHCR for attestation
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub artifact attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ghcr.io/ruisi-lu/academic-literature-mining-skill
          subject-digest: ${{ needs.image.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Publish GitHub Release
    needs:
      - validate
      - image
      - attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release after the image is available
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            printf 'Release %s already exists; leaving it unchanged.\n' "$GITHUB_REF_NAME"
            exit 0
          fi
          release_flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Academic Literature Mining ${GITHUB_REF_NAME}" \
            --notes "Prebuilt image: \`ghcr.io/ruisi-lu/academic-literature-mining-skill:${VERSION}\` (${IMAGE_DIGEST})" \
            "${release_flags[@]}"
