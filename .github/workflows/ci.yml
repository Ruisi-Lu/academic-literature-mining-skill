name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install declared Rust components
        run: rustup component add clippy rustfmt

      - name: Validate formatting
        run: cargo fmt --all -- --check

      - name: Lint all targets
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test all targets
        run: cargo test --all-targets --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate JSON assets
        run: |
          for file in assets/*.json; do
            jq empty "$file"
          done

      - name: Validate Docker Compose configuration
        run: |
          LITMINE_PROJECT=ci-validation \
            QDRANT_API_KEY=ci-validation-secret \
            docker compose --profile cli config --quiet

  container:
    name: Container build
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build the linux/amd64 image without publishing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: academic-literature-mining:ci
          build-args: |
            LITMINE_VERSION=ci
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
