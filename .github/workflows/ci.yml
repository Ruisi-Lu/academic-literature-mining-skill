name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install declared Rust components
        run: rustup component add clippy rustfmt

      - name: Validate formatting
        run: cargo fmt --all -- --check

      - name: Lint all targets
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test all targets
        run: cargo test --all-targets --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Validate JSON assets
        run: |
          for file in assets/*.json; do
            jq empty "$file"
          done

      - name: Validate Docker Compose configuration
        run: |
          LITMINE_PROJECT=ci-validation \
            QDRANT_API_KEY=ci-validation-secret \
            docker compose --profile cli config --quiet

  container:
    name: Container build (${{ matrix.platform }})
    needs: rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
            cache_scope: litmine-container-linux-amd64
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
            cache_scope: litmine-container-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build the native image without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: academic-literature-mining:ci-${{ matrix.arch }}
          build-args: |
            LITMINE_VERSION=ci
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max,ignore-error=true
          provenance: false
          sbom: false
